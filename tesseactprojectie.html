<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // OMNI-BRIDGE TESSERACT + AUDIO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #030508;
            color: #38bdf8;
            font-family: 'Monaco', 'Consolas', 'Ubuntu Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            cursor: crosshair;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 2;
            background: rgba(5, 8, 12, 0.85);
            padding: 20px 25px;
            border: 1px solid #1e293b;
            border-left: 3px solid #38bdf8;
            border-radius: 4px;
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            backdrop-filter: blur(6px);
            transition: border-color 0.5s ease;
        }
        h1 { font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; color: #e2e8f0; }
        p { font-size: 0.75rem; color: #64748b; line-height: 1.6; }
        .highlight { color: #00ff00; }
        .warning { color: #ff4500; font-weight: bold; }
        .data-stream { color: #38bdf8; margin-top: 15px; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="vortexCanvas"></canvas>

    <div id="overlay">
        <h1>VORTEX // OMNI-BRIDGE</h1>
        <p>4D Stereografische Projectie (CPU Render)<br>
        Quaternion Kinematica (q = w+xi+yj+zk)<br>
        Archaeoakoestische Auralisatie (54Hz)<br>
        <span id="click-warning" class="warning">> KLIK OP HET SCHERM OM ENGINE TE STARTEN</span></p>
        <div class="data-stream" id="telemetry">> SYSTEEM STANDBY</div>
    </div>

<script>
// ==========================================
// DEEL 1: 4D QUATERNION WISKUNDE (CPU)
// ==========================================
const VORTEX_ANGLE_RAD = 0.506145; // 29 graden
const PHI = 1.6180339887;

function qmul(q1, q2) {
    return {
        x: q1.x * q2.w + q1.y * q2.z - q1.z * q2.y + q1.w * q2.x,
        y: -q1.x * q2.z + q1.y * q2.w + q1.z * q2.x + q1.w * q2.y,
        z: q1.x * q2.y - q1.y * q2.x + q1.z * q2.w + q1.w * q2.z,
        w: -q1.x * q2.x - q1.y * q2.y - q1.z * q2.z + q1.w * q2.w
    };
}

function createRotor(x, y, z, angle) {
    const s = Math.sin(angle / 2.0);
    return { x: x * s, y: y * s, z: z * s, w: Math.cos(angle / 2.0) };
}

function project4Dto2D(p4) {
    const distance = 3.0;
    const w_factor = 1.0 / (distance - p4.w);
    const p3 = { x: p4.x * w_factor, y: p4.y * w_factor, z: p4.z * w_factor };
    const z_factor = 1.0 / (distance - p3.z);
    return { x: p3.x * z_factor, y: p3.y * z_factor };
}

// Genereer de 16 basispunten van de Tesseract (-1 of 1)
const baseNodes = [];
for (let i = 0; i < 16; i++) {
    baseNodes.push({
        x: (i & 1) ? 1 : -1,
        y: ((i >> 1) & 1) ? 1 : -1,
        z: ((i >> 2) & 1) ? 1 : -1,
        w: ((i >> 3) & 1) ? 1 : -1
    });
}

// ==========================================
// DEEL 2: CANVAS 2D RENDER ENGINE
// ==========================================
const canvas = document.getElementById('vortexCanvas');
const ctx = canvas.getContext('2d');
let cw, ch, cx, cy, scale;

function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
    cx = cw / 2;
    cy = ch / 2;
    scale = Math.min(cw, ch) * 0.35; // Visuele schaal
}
window.addEventListener('resize', resize);
resize();

// ==========================================
// DEEL 3: AUDIO ENGINE
// ==========================================
let audioCtx, masterGain, droneOsc, breathFilter;
let isAudioInitialized = false;

function initAudio() {
    if (isAudioInitialized) return;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    breathFilter = audioCtx.createBiquadFilter();
    breathFilter.type = 'lowpass';
    breathFilter.frequency.value = 100;
    breathFilter.Q.value = 4.0;
    breathFilter.connect(masterGain);

    droneOsc = audioCtx.createOscillator();
    droneOsc.type = 'sawtooth';
    droneOsc.frequency.value = 54.0;
    droneOsc.connect(breathFilter);
    droneOsc.start();

    isAudioInitialized = true;
    
    document.getElementById('click-warning').style.display = 'none';
    document.getElementById('overlay').style.borderLeft = '3px solid #00ff00';
}

function updateAuralization(timeSec) {
    if (!isAudioInitialized || !audioCtx) return;
    const breathSignal = (Math.sin(timeSec * 2.0) + 1.0) / 2.0;
    const filterFreq = 80 + (breathSignal * 300);
    breathFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);

    const torsionSignal = Math.sin(timeSec * 0.506145); 
    droneOsc.detune.setTargetAtTime(torsionSignal * 15, audioCtx.currentTime, 0.1);
}

window.addEventListener('mousedown', () => {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
});

// ==========================================
// DEEL 4: MASTER RENDER LOOP
// ==========================================
const telemetryElement = document.getElementById('telemetry');

function render(now) {
    const timeSec = now * 0.001;

    // Wis het canvas met een subtiele fade-out (voor mooie bewegingsonscherpte)
    ctx.fillStyle = 'rgba(3, 5, 8, 0.4)';
    ctx.fillRect(0, 0, cw, ch);

    // 4D Ademhaling
    const breathScale = 0.90 + ((Math.sin(timeSec * 2.0) + 1.0) / 2.0) * 0.18;

    // Rotatie Quaternions
    const theta = timeSec * VORTEX_ANGLE_RAD;
    const rotorXW = createRotor(1, 0, 0, theta);
    const rotorYZ = createRotor(0, 1, 0, theta * PHI);

    const projectedNodes = [];

    // Bereken alle 16 hoekpunten
    for (let i = 0; i < 16; i++) {
        let node = { ...baseNodes[i] };
        
        // Pas schaal toe
        node.x *= breathScale; node.y *= breathScale; node.z *= breathScale; node.w *= breathScale;

        // Pas rotaties toe
        node = qmul(rotorXW, node);
        node = qmul(rotorYZ, node);

        // Projecteer naar 2D
        const p2 = project4Dto2D(node);
        projectedNodes.push({
            x: cx + p2.x * scale,
            y: cy + p2.y * scale
        });
    }

    // Teken Ribben (Hamming distance = 1)
    ctx.lineWidth = 2;
    for (let i = 0; i < 16; i++) {
        for (let j = i + 1; j < 16; j++) {
            const diff = i ^ j;
            if (diff === 1 || diff === 2 || diff === 4 || diff === 8) {
                ctx.beginPath();
                ctx.moveTo(projectedNodes[i].x, projectedNodes[i].y);
                ctx.lineTo(projectedNodes[j].x, projectedNodes[j].y);
                
                // Neon gloed effect
                ctx.strokeStyle = 'rgba(0, 150, 255, 0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00aaff';
                ctx.stroke();
            }
        }
    }

    // Teken Knooppunten
    for (let i = 0; i < 16; i++) {
        ctx.beginPath();
        ctx.arc(projectedNodes[i].x, projectedNodes[i].y, 4, 0, Math.PI * 2);
        
        // Highlight spiegelpunten (0, 5, 10, 15)
        if (i === 0 || i === 5 || i === 10 || i === 15) {
            ctx.fillStyle = '#00ff00';
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 15;
        } else {
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
        }
        ctx.fill();
    }

    // Audio & Telemetrie updaten
    updateAuralization(timeSec);
    
    if (isAudioInitialized && Math.floor(now) % 15 === 0) {
        const breathVal = ((Math.sin(timeSec * 2.0) + 1.0) / 2.0 * 100).toFixed(1);
        telemetryElement.innerHTML = `> SYNC: AUDIO/VISUEEL VERGRENDELD<br>> AURALISATIE FREQ: 54Hz<br>> FILTER EXPANSIE: <span class="highlight">${breathVal}%</span>`;
    }

    requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>

</body>
</html>
