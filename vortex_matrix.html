<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX — Palace Set Matrix & Gray-Code Router</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0c0f12;
            color: #e2e8f0;
            font-family: 'Monaco', 'Consolas', 'Ubuntu Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #dashboard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #13181e 0%, #080a0d 100%);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        header {
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            width: 100%;
            padding-bottom: 12px;
        }
        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #38bdf8;
            text-transform: uppercase;
        }
        p.subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }
        canvas {
            background-color: #090d11;
            border: 1px solid #1e293b;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        footer {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #475569;
            text-align: center;
            width: 100%;
        }
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            font-size: 0.75rem;
            background: rgba(30, 41, 59, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(30, 41, 59, 0.5);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="dashboard-container">
    <header>
        <h1>VORTEX // Palace Set Matrix</h1>
        <p class="subtitle">Klik op een knoop om de Gray-code vector-routing te initialiseren</p>
    </header>

    <canvas id="vortexCanvas" width="500" height="500"></canvas>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#2E8B57"></div>Hout (Wood)</div>
        <div class="legend-item"><div class="dot" style="background:#FF4500"></div>Vuur (Fire)</div>
        <div class="legend-item"><div class="dot" style="background:#DAA520"></div>Aarde (Earth)</div>
        <div class="legend-item"><div class="dot" style="background:#D3D3D3"></div>Metaal (Metal)</div>
        <div class="legend-item"><div class="dot" style="background:#1E90FF"></div>Water (Water)</div>
    </div>

    <footer>
        <span>Ijktransport-algebra & Torsie Geometrie geactiveerd</span>
    </footer>
</div>

<script>
const canvas = document.getElementById('vortexCanvas');
const ctx = canvas.getContext('2d');

// 1. Wuxing Kleurenpalet & Stijlen (Shao Yong / VORTEX Dashboard)
const WUXING_COLORS = {
    'WOOD':  '#2E8B57', 
    'FIRE':  '#FF4500', 
    'EARTH': '#DAA520', 
    'METAL': '#D3D3D3', 
    'WATER': '#1E90FF'  
};

const INTERACTION_STYLES = {
    'SHENG': { color: 'rgba(46, 139, 87, 0.6)', dash: [] },        // Genererend: Vloeiend groen
    'KE':    { color: 'rgba(255, 69, 0, 0.8)',  dash: [4, 4] },    // Controlerend: Rood, gestippeld (frictie)
    'SAME':  { color: 'rgba(100, 149, 237, 0.4)', dash: [] }       // Zelfde fase: Neutraal blauw
};

// 2. Data Modellering: Voorbeeldset (Palace Dui getransformeerd naar binaire matrix-knopen)
// Posities 0 t/m 7 corresponderen met de hoeken van de octagoon (i * pi/4)
const palaceNodes = [
    { val: 0x1B, wuxing: 'METAL' }, // Knoop 0
    { val: 0x1A, wuxing: 'WATER' }, // Knoop 1
    { val: 0x18, wuxing: 'WOOD' },  // Knoop 2
    { val: 0x1C, wuxing: 'FIRE' },  // Knoop 3
    { val: 0x14, wuxing: 'EARTH' }, // Knoop 4
    { val: 0x04, wuxing: 'METAL' }, // Knoop 5
    { val: 0x0C, wuxing: 'WATER' }, // Knoop 6 (Uun)
    { val: 0x24, wuxing: 'WOOD' }   // Knoop 7 (Gui)
];

// Globale transitie-state voor de reizende stip
let activePhoton = null;

/**
 * Berekent de Wuxing interactie-algebra (Ijkveld-matrix)
 */
function getWuxingInteraction(w1, w2) {
    if (w1 === w2) return 'SAME';
    const shengRules = { 'WOOD':'FIRE', 'FIRE':'EARTH', 'EARTH':'METAL', 'METAL':'WATER', 'WATER':'WOOD' };
    if (shengRules[w1] === w2 || shengRules[w2] === w1) return 'SHENG';
    return 'KE'; // Overige kruisverbindingen genereren frictie/torsie
}

/**
 * Main Render Loop
 */
function renderVortexOctagon(timestamp) {
    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height / 2;
    const R = 160; // Straal van het ijkveld

    ctx.clearRect(0, 0, width, height);

    // --- STAP 1: BEREKEN EN TEKEN DE TRANSITIE-BANEN (LINKS) ---
    palaceNodes.forEach((node, i) => {
        const theta1 = i * (Math.PI / 4);
        const x1 = centerX + R * Math.cos(theta1);
        const y1 = centerY + R * Math.sin(theta1);

        // Binaire inversie: XOR met 111111 (0x3F) om de complementaire pool te vinden
        const complementVal = node.val ^ 0x3F;
        const complementIndex = palaceNodes.findIndex(n => n.val === complementVal);

        if (complementIndex !== -1 && complementIndex > i) {
            const theta2 = complementIndex * (Math.PI / 4);
            const x2 = centerX + R * Math.cos(theta2);
            const y2 = centerY + R * Math.sin(theta2);

            const interactionType = getWuxingInteraction(node.wuxing, palaceNodes[complementIndex].wuxing);
            const style = INTERACTION_STYLES[interactionType];

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);

            if (interactionType === 'KE') {
                // Harmonische tijds-oscillatie (wringende ruimtetijd-pulsing)
                const pulse = (Math.sin(timestamp * 0.004) + 1) / 2;
                ctx.strokeStyle = `rgba(255, 69, 0, ${0.3 + pulse * 0.6})`;
                ctx.lineWidth = 2.5;
            } else {
                ctx.strokeStyle = style.color;
                ctx.lineWidth = 1.5;
            }

            ctx.setLineDash(style.dash);
            ctx.stroke();
        }
    });

    // --- STAP 2: INJECTIE INTERACTIEVE FOTON-ROUTERING (GRAY-CODE) ---
    if (activePhoton) {
        const theta1 = activePhoton.startIdx * (Math.PI / 4);
        const theta2 = activePhoton.endIdx * (Math.PI / 4);

        const x1 = centerX + R * Math.cos(theta1);
        const y1 = centerY + R * Math.sin(theta1);
        const x2 = centerX + R * Math.cos(theta2);
        const y2 = centerY + R * Math.sin(theta2);

        // LERP voor positiebepaling
        const photonX = x1 + (x2 - x1) * activePhoton.progress;
        const photonY = y1 + (y2 - y1) * activePhoton.progress;

        // Foton Glow-effect
        ctx.beginPath();
        ctx.arc(photonX, photonY, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#38bdf8';
        ctx.fill();
        ctx.shadowBlur = 0; // Reset direct ter bescherming render-pipeline

        // Zwevende Gray-code Data-tag
        ctx.fillStyle = '#38bdf8';
        ctx.font = '10px monospace';
        ctx.fillText(activePhoton.grayLabel, photonX + 12, photonY - 4);

        activePhoton.progress += activePhoton.speed;
        if (activePhoton.progress >= 1) activePhoton = null; // Einde transitie bereikt
    }

    // --- STAP 3: RENDER DE KNOPEN (NODES) ---
    ctx.setLineDash([]); 
    palaceNodes.forEach((node, i) => {
        const theta = i * (Math.PI / 4);
        const x = centerX + R * Math.cos(theta);
        const y = centerY + R * Math.sin(theta);

        // Buitencirkel / Glow
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, 2 * Math.PI);
        ctx.fillStyle = '#090d11';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = WUXING_COLORS[node.wuxing];
        ctx.stroke();

        // Interne Core
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, 2 * Math.PI);
        ctx.fillStyle = WUXING_COLORS[node.wuxing];
        ctx.fill();

        // Data-labels (Hexadecimaal & Bitwise status)
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '11px monospace';
        
        // Label-positionering buiten de cirkel-radius
        const offsetFactor = 28;
        const lx = x + offsetFactor * Math.cos(theta) - 15;
        const ly = y + offsetFactor * Math.sin(theta) + 4;
        
        ctx.fillText(`0x${node.val.toString(16).toUpperCase().padStart(2, '0')}`, lx, ly);
    });

    requestAnimationFrame(renderVortexOctagon);
}

/**
 * Event-Listener voor Node-Selectie via Raycasting
 */
canvas.addEventListener('click', (event) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = event.clientX - rect.left;
    const mouseY = event.clientY - rect.top;

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const R = 160;

    palaceNodes.forEach((node, i) => {
        const theta = i * (Math.PI / 4);
        const nodeX = centerX + R * Math.cos(theta);
        const nodeY = centerY + R * Math.sin(theta);
        const distance = Math.hypot(mouseX - nodeX, mouseY - nodeY);

        // Binnen hit-radius van 18px?
        if (distance <= 18) {
            // Bereken Gray-code: G(x) = x ^ (x >> 1)
            const grayCode = node.val ^ (node.val >> 1);
            
            const complementVal = node.val ^ 0x3F;
            const destIndex = palaceNodes.findIndex(n => n.val === complementVal);

            if (destIndex !== -1) {
                activePhoton = {
                    startIdx: i,
                    endIdx: destIndex,
                    progress: 0,
                    speed: 0.025, // Constante stabele kloksnelheid voor datatransport
                    grayLabel: `G: 0b${grayCode.toString(2).padStart(6, '0')}`
                };
            }
        }
    });
});

// Start de render-pipeline
requestAnimationFrame(renderVortexOctagon);
</script>

</body>
</html>
